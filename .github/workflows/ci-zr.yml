# This workflow contains all zr-tock-ci, separated into jobs

name: zr-tock-ci
env:
  TERM: xterm # Makes tput work in actions output

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push: # Run CI for all branches except GitHub merge queue tmp branches
    branches-ignore:
    - "gh-readonly-queue/**"
  merge_group: # Run CI for the GitHub merge queue

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
# If you add additional jobs, remember to add them to bors.toml
permissions:
  contents: read

jobs:
  ci-format:
    strategy:
      matrix:
        os: [ubuntu-latest]
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      - name:      ci-job-format
        run:  make ci-job-format
      - name:      ci-job-markdown-toc
        run:  make ci-job-markdown-toc
      - name:      ci-job-readme-check
        run:  make ci-job-readme-check

  ci-clippy:
    strategy:
      matrix:
        os: [ubuntu-latest]
    # The type of runner that the job will run on
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: 'zerorisc/opentitan'
          ssh-key: ${{ secrets.OPENTITAN_DEPLOY_KEY }}
          path: opentitan
      - name:      ci-job-clippy
        run:  REPO_TOP=$(realpath opentitan) make ci-job-clippy

  ci-build:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 12

    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: 'zerorisc/opentitan'
          ssh-key: ${{ secrets.OPENTITAN_DEPLOY_KEY }}
          path: opentitan
      - name:      ci-job-ot-syntax
        run:  REPO_TOP=$(realpath opentitan) make ci-job-ot-syntax
      - name:      ci-job-ot-compilation
        run:  REPO_TOP=$(realpath opentitan) make ci-job-ot-compilation
      - name:      ci-job-ot-collect-artifacts
        run:  make ci-job-ot-collect-artifacts
      - name: upload-build-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: tools/ci-artifacts
  
